<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<title>E-Book Interaktif Kearifan Lokal Semanding</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* ── CSS VARIABLES ── */
:root{
  /* Safe area from notch/home bar */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);

  /* Toolbar height + slider height + gaps */
  --chrome: 80px;

  /* Use dvh (dynamic viewport) so mobile browser chrome is excluded */
  --vh100: 100dvh;

  --pw: min(430px, 96vw);
  --ph: min(640px, calc(var(--vh100) - var(--chrome) - var(--sat) - var(--sab)));
  --card-shadow:0 8px 32px rgba(0,0,0,0.16),0 2px 8px rgba(0,0,0,0.10);
  --fs: clamp(8.5px, 2vw, 11px);
}

/* Fallback for browsers without dvh */
@supports not (height: 100dvh){
  :root{ --vh100: 100vh; }
}

/* ── BODY & LAYOUT ── */
html{height:100%;height:-webkit-fill-available;}
body{
  font-family:'Nunito',sans-serif;
  width:100%;
  min-height:100vh;
  min-height:-webkit-fill-available;
  min-height:100dvh;
  background:radial-gradient(ellipse at 50% 30%,#c8c0b4,#b0a898);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  touch-action:none;
  user-select:none;
  overflow:hidden;
  padding-top:max(var(--sat), 0px);
  padding-bottom:max(var(--sab), 0px);
  padding-left:var(--sal);
  padding-right:var(--sar);
}

/* ── TOOLBAR ── */
.toolbar{
  position:fixed;top:10px;right:10px;z-index:9999;
  display:flex;gap:3px;align-items:center;
  background:rgba(255,255,255,0.93);border-radius:10px;
  padding:4px 7px;box-shadow:0 2px 12px rgba(0,0,0,0.15);
}
.tb-btn{width:30px;height:30px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:background .15s;color:#444;}
.tb-btn:hover{background:rgba(0,0,0,0.07);}
.tb-btn svg{width:17px;height:17px;}
.tb-divider{width:1px;height:18px;background:#ddd;margin:0 1px;}

/* ── SLIDER ── */
.slider-bar{
  position:fixed;
  bottom:max(8px, calc(var(--sab) + 4px));
  left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.93);border-radius:30px;
  padding:5px 13px;box-shadow:0 2px 12px rgba(0,0,0,.14);
  z-index:9998;max-width:calc(100vw - 16px);
}
.slider-bar input[type=range]{width:clamp(90px,38vw,170px);accent-color:#2E7D32;}
.slider-page-num{font-size:10px;font-weight:700;color:#444;min-width:36px;white-space:nowrap;}

/* ── ARROWS ── */
.arrow-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.9);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.18);transition:all .15s;z-index:20;
}
.arrow-btn:hover{background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.25);}
.arrow-btn:disabled{opacity:.28;cursor:not-allowed;}
.arrow-btn svg{width:18px;height:18px;stroke:#444;}
.arrow-left{left:-44px;}
.arrow-right{right:-44px;}

/* ── BOOK SCENE ── */
.book-scene{
  position:relative;
  width:var(--pw);height:var(--ph);
  margin:0 auto;
  perspective:1400px;
}
.stack-card{
  position:absolute;width:var(--pw);height:var(--ph);
  border-radius:10px;background:#e9ddd0;
  box-shadow:var(--card-shadow);top:0;left:0;
}
.stack-card.c1{transform:rotate(2.5deg) translate(6px,5px);background:#e2d4c3;z-index:1;}
.stack-card.c2{transform:rotate(5deg) translate(12px,10px);background:#d6c8b2;z-index:0;}

/* ── MAIN PAGE + FLIP ANIMATION ── */
.main-page{
  position:absolute;top:0;left:0;
  width:var(--pw);height:var(--ph);
  border-radius:10px;background:#fff;
  box-shadow:var(--card-shadow);
  z-index:10;overflow:hidden;
  transform-origin:center center;
  transform-style:preserve-3d;
  will-change:transform,opacity;
}

/* Realistic book-flip: page curls from right edge (next) or left edge (prev) */
.main-page.flip-fwd{animation:bookFlipFwd .5s cubic-bezier(.4,0,.2,1) forwards;}
.main-page.flip-back{animation:bookFlipBack .5s cubic-bezier(.4,0,.2,1) forwards;}

@keyframes bookFlipFwd{
  0%  {transform:rotateY(0deg) scale(1);box-shadow:var(--card-shadow);}
  30% {transform:rotateY(-25deg) scale(.97);box-shadow:14px 8px 40px rgba(0,0,0,.28);}
  49% {transform:rotateY(-88deg) scale(.94);opacity:1;box-shadow:20px 4px 50px rgba(0,0,0,.32);}
  50% {transform:rotateY(88deg) scale(.94);opacity:0;}
  51% {opacity:1;}
  75% {transform:rotateY(18deg) scale(.98);box-shadow:var(--card-shadow);}
  100%{transform:rotateY(0deg) scale(1);box-shadow:var(--card-shadow);}
}
@keyframes bookFlipBack{
  0%  {transform:rotateY(0deg) scale(1);box-shadow:var(--card-shadow);}
  30% {transform:rotateY(25deg) scale(.97);box-shadow:-14px 8px 40px rgba(0,0,0,.28);}
  49% {transform:rotateY(88deg) scale(.94);opacity:1;box-shadow:-20px 4px 50px rgba(0,0,0,.32);}
  50% {transform:rotateY(-88deg) scale(.94);opacity:0;}
  51% {opacity:1;}
  75% {transform:rotateY(-18deg) scale(.98);box-shadow:var(--card-shadow);}
  100%{transform:rotateY(0deg) scale(1);box-shadow:var(--card-shadow);}
}

/* swipe drag feel */
.main-page.dragging{transition:transform .05s;will-change:transform;}

/* ── COVER ── */
.cover-page{width:100%;height:100%;display:flex;flex-direction:column;background:linear-gradient(160deg,#1B5E20,#2E7D32,#43A047);}
.cover-sky{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 12px 6px;text-align:center;}
.cover-logos{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;justify-content:center;}
.cover-logo-badge{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.4);color:#fff;border-radius:7px;padding:2px 8px;font-size:8px;font-weight:800;line-height:1.3;text-align:center;}
.cover-logo-badge.red{background:rgba(183,28,28,.35);}
.cover-logo-badge.blue2{background:rgba(21,101,192,.35);}
.cover-kelas{color:rgba(255,255,255,.7);font-size:10px;font-weight:800;letter-spacing:2px;margin-bottom:3px;}
.cover-kelas span{font-family:'Fredoka One',cursive;font-size:16px;color:#fff;margin-left:3px;}
.cover-title-main{font-family:'Fredoka One',cursive;font-size:clamp(20px,5vw,26px);color:#fff;line-height:1.15;text-shadow:0 2px 8px rgba(0,0,0,.25);margin-bottom:3px;}
.cover-subtitle{font-size:9px;color:rgba(255,255,255,.85);font-weight:600;margin-bottom:5px;}
.cover-scene{background:linear-gradient(180deg,#81C784,#A5D6A7);padding:10px 12px;display:flex;justify-content:center;align-items:center;}
.cover-scene-img{width:100%;display:flex;align-items:flex-end;justify-content:center;gap:6px;}
.building{width:60px;background:#FFF8E1;border-radius:6px 6px 0 0;padding:5px;text-align:center;border:2px solid #F9A825;}
.building-sign{font-size:6px;font-weight:800;color:#E65100;background:#FFF9C4;border-radius:3px;padding:2px 3px;}
.trees{font-size:16px;}
.chars{font-size:16px;letter-spacing:-2px;}
.lung-circle{font-size:24px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.next-sign{background:linear-gradient(135deg,#FF6B35,#FF4500);color:#fff;border:none;border-radius:18px;padding:5px 13px;font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2);}
.cover-footer{background:rgba(0,0,0,.25);padding:4px 10px;font-size:8px;color:rgba(255,255,255,.85);font-style:italic;text-align:center;border-radius:0 0 10px 10px;}

/* ── INNER PAGES ── */
.inner-page{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}

/* Topbar: ONLY title (no nav buttons) */
.inner-topbar{
  display:flex;align-items:center;justify-content:center;
  padding:7px 12px;font-size:11px;font-weight:700;color:#fff;
  flex-shrink:0;
}
.topbar-title{font-family:'Fredoka One',cursive;font-size:13px;letter-spacing:.3px;text-align:center;}

/* Body: fills remaining space, NO scroll */
.inner-body{
  flex:1;
  padding:8px 11px;
  overflow:hidden;
  display:flex;flex-direction:column;
  gap:5px;
  min-height:0;
}

/* Compact cards */
.card{background:#fff;border-radius:8px;padding:7px 10px;box-shadow:0 2px 6px rgba(0,0,0,.07);flex-shrink:0;}
.card-title{font-size:var(--fs);font-weight:800;margin-bottom:3px;}
.card-text{font-size:var(--fs);color:#555;line-height:1.45;}
.highlight{border-left:3px solid;border-radius:0 7px 7px 0;padding:6px 9px;font-size:var(--fs);line-height:1.45;flex-shrink:0;}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex-shrink:0;}
.mini-card{background:#fff;border-radius:8px;padding:6px 5px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,.08);}
.mini-card .micon{font-size:17px;margin-bottom:2px;}
.mini-card .mlabel{font-size:9px;font-weight:800;color:#333;margin-bottom:1px;}
.mini-card .mdesc{font-size:8px;color:#666;line-height:1.25;}
.list-item{display:flex;gap:6px;font-size:var(--fs);color:#444;line-height:1.4;flex-shrink:0;}
.list-item::before{content:'✦';color:currentColor;flex-shrink:0;font-size:8px;margin-top:2px;}
.toc-row{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:8px;cursor:pointer;background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.06);border-left:3px solid;transition:transform .15s;flex-shrink:0;}
.toc-row:hover{transform:translateX(3px);}
.toc-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;}
.toc-lbl{font-size:10px;font-weight:700;color:#333;}
.benefit-row{display:flex;gap:7px;background:#fff;border-radius:8px;padding:6px 8px;box-shadow:0 2px 5px rgba(0,0,0,.07);flex-shrink:0;}
.benefit-row .bicon{font-size:17px;flex-shrink:0;}
.benefit-row .btitle{font-size:10px;font-weight:800;margin-bottom:1px;}
.benefit-row .bdesc{font-size:9px;color:#555;line-height:1.35;}

/* QUIZ */
.quiz-opt{display:flex;align-items:center;gap:6px;padding:5px 9px;border-radius:7px;margin-bottom:4px;cursor:pointer;border:2px solid #FFB74D;font-size:var(--fs);font-weight:600;color:#37474F;background:#fff;transition:all .15s;flex-shrink:0;}
.quiz-opt:hover{border-color:#E65100;background:#FFF8E1;}
.quiz-opt.correct{border-color:#43A047;background:#E8F5E9;color:#2E7D32;pointer-events:none;}
.quiz-opt.wrong{border-color:#E53935;background:#FFEBEE;color:#B71C1C;pointer-events:none;}
.quiz-opt.disabled{pointer-events:none;opacity:.6;}
.fb-box{border-radius:7px;padding:5px 9px;margin-top:4px;font-weight:700;font-size:10px;text-align:center;flex-shrink:0;}
.fb-box.correct{background:#E8F5E9;color:#2E7D32;border:2px solid #43A047;}
.fb-box.wrong{background:#FFEBEE;color:#C62828;border:2px solid #E53935;}

/* EVAL */
.eval-opt{display:flex;align-items:center;gap:6px;padding:5px 9px;border-radius:7px;margin-bottom:4px;cursor:pointer;border:2px solid #CE93D8;font-size:var(--fs);color:#333;background:#fff;transition:all .15s;flex-shrink:0;}
.eval-opt:hover{border-color:#7B1FA2;background:#F3E5F5;}
.eval-opt.selected{border-color:#7B1FA2;background:#EDE7F6;color:#4527A0;}
.btn-eval{background:linear-gradient(135deg,#7B1FA2,#AB47BC);color:#fff;padding:7px 20px;font-size:12px;border-radius:22px;border:none;cursor:pointer;font-weight:800;font-family:'Fredoka One',cursive;margin-top:4px;box-shadow:0 3px 10px rgba(0,0,0,.13);transition:all .2s;flex-shrink:0;}
.btn-eval:hover{transform:scale(1.02);}

/* LKPD */
.lkpd-task{background:#fff;border-radius:8px;padding:7px 10px;border-left:3px solid #43A047;box-shadow:0 2px 5px rgba(0,0,0,.07);flex-shrink:0;}
.lkpd-num{font-family:'Fredoka One',cursive;font-size:13px;color:#2E7D32;margin-bottom:1px;}
.lkpd-title{font-size:10px;font-weight:800;color:#1B5E20;margin-bottom:2px;}
.lkpd-desc{font-size:9px;color:#555;line-height:1.35;margin-bottom:3px;}
.lkpd-input{width:100%;background:#F9FBF9;border:1.5px solid #A5D6A7;border-radius:6px;color:#333;font-family:'Nunito',sans-serif;font-size:9px;padding:4px 6px;resize:none;height:32px;margin-top:1px;}

/* GLOSARIUM */
.glos-row{display:flex;gap:6px;padding:4px 0;border-bottom:1px solid #eee;flex-shrink:0;}
.glos-term{font-weight:800;color:#1B5E20;min-width:85px;font-size:9px;flex-shrink:0;}
.glos-def{color:#555;font-size:9px;line-height:1.4;flex:1;}

/* YT */
.yt-wrap{position:relative;width:100%;padding-bottom:50%;height:0;overflow:hidden;border-radius:8px;border:2px solid;flex-shrink:0;}
.yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.yt-lbl{font-size:9px;font-weight:700;margin-bottom:2px;flex-shrink:0;}
.pg-footer{text-align:center;padding:4px;font-size:8px;color:#aaa;border-top:1px solid rgba(0,0,0,.06);font-style:italic;flex-shrink:0;}

/* RESULT POPUP */
.result-pop{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .25s;}
.result-pop.show{opacity:1;pointer-events:all;}
.result-box{background:#fff;border-radius:18px;padding:20px 26px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.28);max-width:260px;width:88%;transform:scale(.82);transition:transform .25s;}
.result-pop.show .result-box{transform:scale(1);}
.r-icon{font-size:40px;margin-bottom:5px;}
.r-title{font-family:'Fredoka One',cursive;font-size:17px;color:#333;margin-bottom:3px;}
.r-score{font-family:'Fredoka One',cursive;font-size:42px;color:#2E7D32;}
.r-msg{font-size:11px;color:#666;margin:4px 0 10px;}
.btn-close-pop{background:linear-gradient(135deg,#43A047,#1B5E20);color:#fff;padding:7px 20px;border-radius:22px;border:none;cursor:pointer;font-family:'Fredoka One',cursive;font-size:12px;}

/* FINISH */
.finish-box{text-align:center;background:#fff;border-radius:10px;padding:10px;box-shadow:0 3px 10px rgba(0,0,0,.09);flex-shrink:0;}
.finish-box .ficon{font-size:26px;margin-bottom:4px;}
.finish-box .fmsg{font-family:'Fredoka One',cursive;font-size:14px;color:#1B5E20;}
.finish-box .fsub{font-size:9px;color:#666;margin-top:2px;}
.btn-restart{background:linear-gradient(135deg,#43A047,#1B5E20);color:#fff;padding:6px 16px;font-size:11px;border-radius:22px;border:none;cursor:pointer;font-weight:800;font-family:'Fredoka One',cursive;margin-top:6px;transition:all .2s;}
.btn-restart:hover{transform:scale(1.04);}

.nilai-badge{display:inline-block;font-family:'Fredoka One',cursive;font-size:30px;color:#2E7D32;border:3px solid #43A047;border-radius:10px;padding:3px 15px;background:#E8F5E9;margin:5px 0;}
.chip{padding:2px 8px;border-radius:18px;font-size:8px;font-weight:700;}

/* ── SWIPE HINT ── */
.swipe-hint{
  position:absolute;bottom:38px;left:50%;transform:translateX(-50%);
  font-size:9px;color:rgba(255,255,255,.6);font-weight:600;
  pointer-events:none;white-space:nowrap;
  animation:hintFade 3s ease forwards 1.5s;
  opacity:0;
}
@keyframes hintFade{0%{opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .arrow-left{left:5px;z-index:30;}
  .arrow-right{right:5px;z-index:30;}
  .toolbar{top:max(6px, calc(var(--sat) + 4px));right:6px;padding:3px 5px;}
}
@media(max-height:500px) and (orientation:landscape){
  :root{--pw:min(320px,52vw);--ph:min(430px,calc(var(--vh100) - 60px));}
  .arrow-left{left:-40px;}
  .arrow-right{right:-40px;}
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="tb-btn" title="Zoom" onclick="toggleZoom()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/></svg>
  </button>
  <div class="tb-divider"></div>
  <button class="tb-btn" title="Fullscreen" onclick="toggleFull()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
  </button>
  <div class="tb-divider"></div>
  <button class="tb-btn" id="soundBtn" title="Suara" onclick="toggleMusic()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
  </button>
</div>

<!-- RESULT POPUP -->
<div class="result-pop" id="resultPop">
  <div class="result-box">
    <div class="r-icon" id="rIcon">🎉</div>
    <div class="r-title" id="rTitle">Hasilmu!</div>
    <div class="nilai-badge" id="rScore">80</div>
    <div class="r-msg" id="rMsg"></div>
    <button class="btn-close-pop" onclick="closePop()">Tutup ✓</button>
  </div>
</div>

<!-- BOOK SCENE -->
<div class="book-scene" id="bookScene">
  <div class="stack-card c2"></div>
  <div class="stack-card c1"></div>
  <div class="main-page" id="mainPage">
    <div class="page-inner" id="pageInner"></div>
  </div>
  <button class="arrow-btn arrow-left" id="btnPrev" onclick="changePage(-1)" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="arrow-btn arrow-right" id="btnNext" onclick="changePage(1)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="swipe-hint" id="swipeHint">👆 Geser kiri/kanan untuk pindah halaman</div>
</div>

<!-- SLIDER -->
<div class="slider-bar">
  <input type="range" id="pageSlider" min="0" max="17" value="0" oninput="sliderChange(this.value)"/>
  <div class="slider-page-num" id="sliderLabel">1 / 18</div>
</div>

<script>
const TOTAL = 18;
let current = 0;
let isAnimating = false;

// ── AUDIO ──
let audioCtx=null,musicOn=false,musicInterval=null,musicNodes=[];
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(f,dur,type='sine',vol=.07,delay=0){
  if(!audioCtx||!musicOn)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  const fl=audioCtx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=1200;
  o.connect(fl);fl.connect(g);g.connect(audioCtx.destination);
  o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(0,audioCtx.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+delay+.06);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+delay+dur);
  o.start(audioCtx.currentTime+delay);o.stop(audioCtx.currentTime+delay+dur+.1);
  musicNodes.push(o);
}
const GN=[261.6,293.6,311.1,392,415.3,523.2,587.3];
function playChord(){if(!musicOn)return;const r=GN[Math.floor(Math.random()*5)];
  playTone(r*.5,3,'sine',.06);playTone(r,2.5,'triangle',.07,.12);
  playTone(r*1.5,2,'sine',.04,.22);}
function startMusic(){initAudio();if(audioCtx.state==='suspended')audioCtx.resume();
  musicOn=true;playChord();musicInterval=setInterval(()=>{if(musicOn)playChord();},2600);}
function stopMusic(){musicOn=false;if(musicInterval)clearInterval(musicInterval);
  musicNodes.forEach(n=>{try{n.stop();}catch(e){}});musicNodes=[];}
function toggleMusic(){

// ── QUIZ LOGIC ──
function answerQuiz(qi,oi){
  if(quizAns[qi]!==null)return;
  quizAns[qi]=oi;const c=quizData[qi].ans;
  for(let i=0;i<quizData[qi].opts.length;i++){
    const el=document.getElementById('qo_'+qi+'_'+i);if(!el)continue;
    el.classList.add(i===c?'correct':'disabled');
    if(i===oi&&i!==c)el.classList.add('wrong');
  }
  const fb=document.getElementById('qf_'+qi);if(!fb)return;
  fb.style.display='block';
  if(oi===c){fb.className='fb-box correct';fb.textContent='✅ Jawaban Benar! Hebat!';successSnd();}
  else{fb.className='fb-box wrong';fb.textContent='❌ Benar: '+String.fromCharCode(65+c)+'. '+quizData[qi].opts[c];errorSnd();}
}
function selectEval(qi,oi){
  clickSnd(550);
  for(let i=0;i<evalData[qi].opts.length;i++){const el=document.getElementById('eo_'+qi+'_'+i);if(el)el.classList.remove('selected');}
  const el=document.getElementById('eo_'+qi+'_'+oi);if(el)el.classList.add('selected');
  evalAns[qi]=oi;
}
function submitEval(){
  clickSnd(700);
  const score=evalAns.filter((a,i)=>a===evalData[i].ans).length;
  const pct=Math.round(score/evalData.length*100);
  evalData.forEach((q,qi)=>{
    for(let oi=0;oi<q.opts.length;oi++){
      const el=document.getElementById('eo_'+qi+'_'+oi);if(!el)continue;
      el.style.pointerEvents='none';
      if(oi===q.ans){el.style.borderColor='#43A047';el.style.background='#E8F5E9';}
      else if(evalAns[qi]===oi){el.style.borderColor='#E53935';el.style.background='#FFEBEE';}
    }
  });
  const eb=document.getElementById('evalBtn');if(eb)eb.style.display='none';
  let msg=pct>=80?'🌟 Luar biasa! Sangat Hebat!':pct>=60?'👍 Bagus! Terus semangat!':'💪 Jangan menyerah! Pelajari lagi ya!';
  showPop(pct>=80?'🎉':pct>=60?'😊':'💪','Nilai Evaluasi Akhir',pct,msg+` (${score}/${evalData.length} benar)`);
  if(pct>=80)successSnd();else if(pct>=60)clickSnd(600);else errorSnd();
}

function showPop(icon,title,score,msg){
  document.getElementById('rIcon').textContent=icon;
  document.getElementById('rTitle').textContent=title;
  document.getElementById('rScore').textContent=score;
  document.getElementById('rMsg').textContent=msg;
  document.getElementById('resultPop').classList.add('show');
}
function closePop(){document.getElementById('resultPop').classList.remove('show');}

// ── NAVIGATION ──
function renderPage(n){
  document.getElementById('pageInner').innerHTML=pg(n+1);
  document.getElementById('btnPrev').disabled=n===0;
  document.getElementById('btnNext').disabled=n===TOTAL-1;
  document.getElementById('pageSlider').value=n;
  document.getElementById('sliderLabel').textContent=(n+1)+' / '+TOTAL;
}
function changePage(dir){
  initAudio();
  const next=current+dir;
  if(next<0||next>=TOTAL||isAnimating)return;
  isAnimating=true;flipSnd();
  const page=document.getElementById('mainPage');
  page.classList.add(dir>0?'flip-fwd':'flip-back');
  setTimeout(()=>{
    page.classList.remove('flip-fwd','flip-back');
    current=next;renderPage(current);isAnimating=false;
  },500);
}
function goToPage(n){
  initAudio();clickSnd(700);
  if(n-1===current||isAnimating)return;
  const dir=n-1>current?1:-1;
  isAnimating=true;flipSnd();
  const page=document.getElementById('mainPage');
  page.classList.add(dir>0?'flip-fwd':'flip-back');
  setTimeout(()=>{page.classList.remove('flip-fwd','flip-back');current=n-1;renderPage(current);isAnimating=false;},500);
}
function sliderChange(val){
  if(parseInt(val)===current||isAnimating)return;
  const dir=parseInt(val)>current?1:-1;
  isAnimating=true;flipSnd();
  const page=document.getElementById('mainPage');
  page.classList.add(dir>0?'flip-fwd':'flip-back');
  setTimeout(()=>{page.classList.remove('flip-fwd','flip-back');current=parseInt(val);renderPage(current);isAnimating=false;},500);
}
function toggleFull(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen();}
  else{document.exitFullscreen();}
}

// ── SWIPE / DRAG ──
(function(){
  const page=document.getElementById('mainPage');
  let startX=0,startY=0,dragging=false,dragDx=0;
  const THRESHOLD=50;

  function onStart(x,y){
    if(isAnimating)return;
    startX=x;startY=y;dragging=true;dragDx=0;
  }
  function onMove(x,y){
    if(!dragging)return;
    const dx=x-startX,dy=y-startY;
    // If primarily vertical, cancel (allow scroll in interactive elements)
    if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dx)<15){dragging=false;return;}
    dragDx=dx;
    // Visual drag feedback
    const rot=dx*0.04;
    const sc=1-Math.abs(dx)*0.0003;
    page.style.transform=`translateX(${dx*0.35}px) rotateY(${-rot}deg) scale(${sc})`;
    page.style.boxShadow=dx>0?
      `-${Math.abs(dx)*0.2}px 8px 40px rgba(0,0,0,.22),0 2px 8px rgba(0,0,0,.10)`:
      `${Math.abs(dx)*0.2}px 8px 40px rgba(0,0,0,.22),0 2px 8px rgba(0,0,0,.10)`;
  }
  function onEnd(){
    if(!dragging)return;
    dragging=false;
    page.style.transform='';
    page.style.boxShadow='';
    if(Math.abs(dragDx)>THRESHOLD){
      changePage(dragDx<0?1:-1);
    }
  }

  // Touch
  page.addEventListener('touchstart',e=>{
    const t=e.touches[0];onStart(t.clientX,t.clientY);
  },{passive:true});
  page.addEventListener('touchmove',e=>{
    const t=e.touches[0];
    const dx=t.clientX-startX,dy=t.clientY-startY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8)e.preventDefault();
    onMove(t.clientX,t.clientY);
  },{passive:false});
  page.addEventListener('touchend',onEnd);
  page.addEventListener('touchcancel',onEnd);

  // Mouse (desktop drag)
  page.addEventListener('mousedown',e=>{onStart(e.clientX,e.clientY);});
  window.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientX,e.clientY);});
  window.addEventListener('mouseup',onEnd);
})();

// ── VIEWPORT HEIGHT FALLBACK (older Android/iOS) ──

  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--vh100', h + 'px');
}

  window.visualViewport.addEventListener('resize', setVh);
} else {
  window.addEventListener('resize', setVh);
  window.addEventListener('orientationchange', ()=>setTimeout(setVh,150));
}
